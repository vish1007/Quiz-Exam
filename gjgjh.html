<!DOCTYPE html>
<html>
<head>
<title>Secure Online Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#eef2f7;
padding:20px;
}
.optionBox{
display:block;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.optionBox input{
margin-right:10px;
}

.optionBox:hover{
background:#f0f6ff;
}

@media (max-width:600px){

.card{
padding:20px;
}

h3{
font-size:18px;
}

button{
width:100%;
font-size:18px;
}

}
.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
max-width:700px;
margin:auto;
}

button{
background:#2563eb;
border:none;
color:white;
padding:12px 20px;
border-radius:5px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

button:hover{background:#1d4ed8}

.hidden{display:none}

#timer{
color:#ef4444;
font-weight:bold;
font-size:22px;
margin-bottom:20px;
}

.warning{color:red;font-weight:bold}

input{padding:8px;width:250px}

</style>
</head>

<body>

<div class="card" id="login">

<h2>Student Login</h2>

<label>Name</label><br>
<input id="name"><br><br>

<label>Application ID</label><br>
<input id="appId" placeholder="Eg: CDS/2025/9999"><br><br>
<label>Email</label><br>
<input id="email" type="email" placeholder="Enter your email"><br><br>
<button id="startBtn" onclick="startTest()">Start Test</button>
<div id="countdownBox" style="text-align:center;margin-top:20px;display:none">
<h1 id="countNumber" style="font-size:80px;color:#2563eb;margin:0"></h1>
<p style="font-size:18px">Test starting...</p>
</div>
<p id="loginWarning" class="warning"></p>

</div>


<div class="card hidden" id="quiz">

<h2>Online Test</h2>

<div id="timer"></div>

<p class="warning" id="warning"></p>

<div id="question-container"></div>

<button id="nextBtn" style="display:none" onclick="nextQuestion()">Next</button>

</div>


<div class="card hidden" id="result">

<h2>Result</h2>

<p id="scoreMsg"></p>

<p id="percentMsg"></p>

<div id="analysis"></div>

</div>


<script>

// GOOGLE SHEET SCRIPT URL

const GOOGLE_SCRIPT_URL="https://script.google.com/macros/s/AKfycbyIf55osyMQiEn581AC1iIsvWRs68b0gySO1L6A1wuIgjIniElbO14hxaP3WMISP-GvwA/exec";


let questions = []
let selectedQuestions=[]

let userAnswers={}

let currentIndex=0

let timer

let time=10*60

let userName
let appId
let userEmail

let examStarted=false

let submitted=false
let questionsReady=false
if(localStorage.getItem("examStarted")=="true"){

alert("Page refresh detected. Exam already started.")

document.body.innerHTML="<h2 style='text-align:center;color:red'>Exam session closed due to refresh.</h2>"

throw new Error("Exam locked")

}
function shuffleArray(array){

for(let i=array.length-1;i>0;i--){

let j = Math.floor(Math.random()*(i+1))

let temp = array[i]

array[i] = array[j]

array[j] = temp

}

}
async function loadQuestions(){

let cached = sessionStorage.getItem("quizQuestions")

if(cached){
questions = JSON.parse(cached)
return
}

let res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now())

let text = await res.text()

// EXAM TIME CHECK
if(text == "Exam has not started yet"){

alert("Exam has not started yet")

document.body.innerHTML =
"<h2 style='text-align:center;margin-top:120px;color:red'>Exam has not started yet</h2>"

throw new Error("Exam locked")

}

if(text == "Exam is closed"){

alert("Exam is closed")

document.body.innerHTML =
"<h2 style='text-align:center;margin-top:120px;color:red'>Exam is closed</h2>"

throw new Error("Exam closed")

}

// If exam active → convert to JSON
questions = JSON.parse(text)

sessionStorage.setItem("quizQuestions",JSON.stringify(questions))

console.log("Questions loaded:", questions)

}

async function checkApplicationId(appId){

let res = await fetch(`${GOOGLE_SCRIPT_URL}?appId=${appId}`)

let result = await res.text()

return result

}
function validateApplicationId(id){

// length check
if(id.length !== 13){
return "Application ID must be 13 characters (Eg: CDS/2025/9999)";
}

// format check using regex
let pattern = /^CDS\/\d{4}\/\d{4}$/;

if(!pattern.test(id)){
return "Application ID must be like CDS/2025/9999 (CDS must be capital)";
}

return "valid";

}
function startCountdown(){

let count = 15

document.getElementById("countdownBox").style.display = "block"
document.getElementById("countNumber").innerText = count

let interval = setInterval(()=>{

count--

document.getElementById("countNumber").innerText = count

if(count === 0){

clearInterval(interval)

// enterFullscreen()

document.getElementById("login").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

let wait = setInterval(()=>{

if(questionsReady){

clearInterval(wait)

document.getElementById("login").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

showQuestion()
startTimer()

}

},100)

}

},1000)

}
async function startTest(){

enterFullscreen()
currentIndex = 0;
userAnswers = {};
time = 10*60;

userName=document.getElementById("name").value
appId=document.getElementById("appId").value.trim()
userEmail = document.getElementById("email").value.trim()

// Validate Application ID
let validation = validateApplicationId(appId)

if(validation !== "valid"){
document.getElementById("loginWarning").innerText = validation
return
}

if(!userName || !appId){
document.getElementById("loginWarning").innerText="Enter details"
return
}

if(!userEmail.includes("@")){
document.getElementById("loginWarning").innerText="Enter valid email"
return
}

// disable button after validation success
document.getElementById("startBtn").disabled = true
document.getElementById("startBtn").innerText = "Starting..."

// start countdown immediately
startCountdown()

// load questions in background
loadExamData()

}

async function loadExamData(){

let status = await checkApplicationId(appId)

if(status=="exists"){
alert("You have already attempted this exam")
return
}

await loadQuestions()

if(questions.length==0){
alert("No questions available")
return
}

selectedQuestions=[...questions]

shuffleArray(selectedQuestions)

selectedQuestions=selectedQuestions.slice(0,10)

questionsReady = true

examStarted=true
localStorage.setItem("examStarted","true")

}
function enterFullscreen(){
document.documentElement.requestFullscreen().catch(()=>{})
}


function startTimer(){

let endTime = Date.now() + (time * 1000)

timer = setInterval(()=>{

let remaining = Math.floor((endTime - Date.now()) / 1000)

if(remaining <= 0){
clearInterval(timer)
updateTimerDisplay(0)
submitTest()
return
}

updateTimerDisplay(remaining)

},1000)

}

function updateTimerDisplay(seconds){

let m = Math.floor(seconds/60)
let s = seconds % 60

document.getElementById("timer").innerText =
`Time Left: ${m}m ${s}s`

}
function saveAnswer(option){

userAnswers[currentIndex] = option

document.getElementById("nextBtn").style.display="inline"
// enable next button
document.getElementById("nextBtn").disabled = false

}

function showQuestion(){

let q=selectedQuestions[currentIndex]

let options = q.options.map(opt => ({
text: opt,
correct: opt === q.answer
}))

shuffleArray(options)

let html=`<h3>Question ${currentIndex+1} of ${selectedQuestions.length}</h3>
<h3>${q.q}</h3>`

options.forEach(o=>{
html+=`
<label class="optionBox">
<input type="radio" name="opt" value="${o.text}" onclick="saveAnswer('${o.text}')">
<span>${o.text}</span>
</label>
`
})

document.getElementById("question-container").innerHTML=html

// hide next button initially
document.getElementById("nextBtn").style.display="none"

// disable next button until option selected
document.getElementById("nextBtn").disabled = true

if(currentIndex==selectedQuestions.length-1)
 document.getElementById("nextBtn").innerText="Submit"

}


function enableNext(){
 document.getElementById("nextBtn").style.display="inline"
}


function nextQuestion(){

if(currentIndex < selectedQuestions.length-1){
 currentIndex++
 showQuestion()
}
else{
 submitTest()
}

}


function submitTest(){

if(submitted) return
submitted=true
localStorage.removeItem("examStarted")
clearInterval(timer)
let score=0
let analysis="<ol>"
let analysisData=[]

selectedQuestions.forEach((q,i)=>{

let ans=userAnswers[i] || "Not Answered"

if(ans===q.answer) score++

analysisData.push({
question:q.q,
options:q.options,
chosen:ans,
correct:q.answer
})

analysis+=`<li>${q.q}<br>Your: ${ans}<br>Correct: ${q.answer}</li><br>`

})

analysis+="</ol>"

let percent=((score/selectedQuestions.length)*100).toFixed(2)

sendToSheet(score,percent,analysisData)

document.getElementById("quiz").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

document.getElementById("scoreMsg").innerText=`Score: ${score}/${selectedQuestions.length}`
document.getElementById("percentMsg").innerText=`Percentage: ${percent}%`

document.getElementById("analysis").innerHTML =
"Detailed response sheet will be sent to your email after 30 minutes.";

}

async function sendToSheet(score,percent,analysisData){

try{

let res = await fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
keepalive:true,
body:JSON.stringify({
name:userName,
appId:appId,
email:userEmail,
score:score,
percent:percent,
total:selectedQuestions.length,
questions:analysisData
}),
headers:{"Content-Type":"text/plain"}
})

let text = await res.text()

console.log("Server response:",text)

}catch(err){

console.error("Error sending result:",err)

}

}


// TAB SWITCH DETECTION

document.addEventListener("visibilitychange",()=>{
if(document.hidden && examStarted){
document.getElementById("warning").innerText="Tab switch detected. Test submitted.";
submitTest()
}
})


// FULLSCREEN EXIT DETECTION

document.addEventListener("fullscreenchange",()=>{
if(!document.fullscreenElement && examStarted){
document.getElementById("warning").innerText="Fullscreen exited. Test submitted.";
submitTest()
}
})
window.addEventListener("blur", function () {
    if (examStarted) {
        document.getElementById("warning").innerText =
            "You left the exam window. Test submitted.";
        submitTest();
    }
});

// DISABLE RIGHT CLICK

document.addEventListener("contextmenu",e=>e.preventDefault())

// DISABLE COPY

document.addEventListener("copy",e=>e.preventDefault())

// DISABLE PASTE

document.addEventListener("paste",e=>e.preventDefault())


// ESC KEY SUBMIT

document.addEventListener("keydown",function(e){

// ESC key
if(e.key=="Escape" && examStarted){
submitTest()
}

// F12
if(e.key=="F12"){
submitTest()
}

// CTRL+SHIFT+I
if(e.ctrlKey && e.shiftKey && e.key=="I"){
submitTest()
}

// CTRL+SHIFT+J
if(e.ctrlKey && e.shiftKey && e.key=="J"){
submitTest()
}

// CTRL+U (view source)
if(e.ctrlKey && e.key=="u"){
submitTest()
}
if(e.key=="F5"){
e.preventDefault()
submitTest()
}
})
// DETECT DEVTOOLS OPEN

setInterval(function(){

let start = performance.now()

debugger

let end = performance.now()

if(end - start > 100){

if(examStarted){
submitTest()
}

}

},1000)
</script>

</body>
</html>
