<!DOCTYPE html>
<html>
<head>
<title>Admin - Bulk Question Upload</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f4f6f9;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

textarea{
width:100%;
height:300px;
font-size:16px;
margin-top:10px;
}

button{
padding:12px 20px;
margin-top:20px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.example{
background:#f1f5f9;
padding:15px;
border-radius:6px;
margin-bottom:20px;
font-family:monospace;
}

input{
width:100%;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<!-- LOGIN BOX -->

<div class="container" id="loginBox">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<div id="loginStatus" style="margin-top:15px;color:red;font-weight:bold"></div>

</div>


<!-- UPLOAD BOX -->

<div class="container" id="uploadBox" style="display:none">

<h2>Bulk Question Upload</h2>

<p><b>Paste questions using the following format:</b></p>

<div class="example">

Which planet is known as the Red Planet?<br>
A. Earth<br>
B. Mars<br>
C. Jupiter<br>
D. Venus<br>
Answer: B<br><br>

Capital of India?<br>
A. Delhi<br>
B. Mumbai<br>
C. Chennai<br>
D. Kolkata<br>
Answer: A

</div>

<textarea id="bulkQuestions" placeholder="Paste questions here..."></textarea>

<br>

<button onclick="uploadQuestions()">Upload Questions</button>

<div id="status" style="margin-top:15px;color:#2563eb;font-weight:bold"></div>

</div>


<script>

const GOOGLE_SCRIPT_URL="https://script.google.com/macros/s/AKfycbyIf55osyMQiEn581AC1iIsvWRs68b0gySO1L6A1wuIgjIniElbO14hxaP3WMISP-GvwA/exec";
function login(){

let username=document.getElementById("username").value.trim();
let password=document.getElementById("password").value.trim();

if(username=="" || password==""){
alert("Enter username and password");
return;
}

fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"login",
username:username,
password:password
}),
headers:{"Content-Type":"text/plain"}
})

.then(r=>r.text())
.then(res=>{

if(res=="success"){

document.getElementById("loginBox").style.display="none";
document.getElementById("uploadBox").style.display="block";

}else{

document.getElementById("loginStatus").innerText="Invalid username or password ❌";

}

})

.catch(err=>{
document.getElementById("loginStatus").innerText="Server error ❌";
console.error(err)
})

}



function uploadQuestions(){

let text=document.getElementById("bulkQuestions").value.trim();

if(text==""){
alert("Please paste questions first");
return;
}

document.getElementById("status").innerText="Uploading questions...";

fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"bulkQuestions",
data:text,
username:document.getElementById("username").value,
password:document.getElementById("password").value
}),
headers:{"Content-Type":"text/plain"}
})

.then(r=>r.text())
.then(res=>{

if(res=="unauthorized"){
document.getElementById("status").innerText="Access denied ❌";
return;
}

document.getElementById("status").innerText="Upload completed successfully ✅";
document.getElementById("bulkQuestions").value="";

})

.catch(err=>{
document.getElementById("status").innerText="Upload failed ❌";
console.error(err)
})

}

</script>

</body>
</html>
